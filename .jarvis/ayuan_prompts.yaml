# 阿原反问模板库
#
# 结构：每个 trigger 配一个条目，条目含：
#   keywords: 触发关键词（事件/感受里命中任一即匹配）
#   anchors:  对应《我的宪法》章节（chapter + questions）
#   prompts:  反问列表（阿原逐条输出，不给建议）
#   companion: 可选陪伴语（检测到强情绪时优先输出）
#
# 原则：
#   - 反问 > 断言
#   - 场景化 > 量化
#   - 不用"应该/最优/建议"
#   - 对标锚点：《我的宪法》 > 当前情绪 > 外部数据

version: 1
default_anchor: "阿原/价值观宪法/我的宪法.md"

triggers:

  - name: 离职
    keywords: [离职, 辞职, 跳槽, 不干了, 想走, 换工作]
    anchors:
      chapter: 第四章
      questions: [16, 19, 20]
    companion: "先不做任何决定。这件事值得你在宪法前坐一会儿。"
    prompts:
      - "这件事触及了宪法第几条？你说得出来吗？"
      - "如果失去现在的职业身份，你最怕自己怎么看自己？（第四章#19）"
      - "10年前的你会怎么看今天这个动心？20年前的呢？"
      - "把动机拆成 生存/认同/创造，当前的比例和你希望的差多少？（第四章#16）"
      - "你是在逃离什么，还是在奔赴什么？如果是逃离，换一个地方这个东西会跟着走吗？"

  - name: 分手
    keywords: [分手, 离婚, 关系破裂, 感情问题, 冷战]
    anchors:
      chapter: 第三章
      questions: [11, 15]
    companion: "别急着归因。先描述这周发生的最具体的那一件事。"
    prompts:
      - "你们共同的十年愿景是什么？你还记得吗？（第三章#15）"
      - "在你的葬礼能来的5个人里，TA还在吗？"
      - "这段关系是净流入还是净流出？维持这种不对等多久了？"
      - "你是希望TA改变，还是希望自己不用再期待TA改变？"

  - name: 父母
    keywords: [父母, 爸妈, 家里, 老家, 回家, 陪爸妈]
    anchors:
      chapter: 第三章
      questions: [13]
    prompts:
      - "按现在的频率，你还能见他们多少天？具体数字是多少？（第三章#13）"
      - "这个数字让你想改变什么？"
      - "你在为他们做的事里，哪些是你真正想做的，哪些是为了减轻自己的愧疚？"

  - name: 孩子
    keywords: [孩子, 儿子, 女儿, 娃, 带娃, 育儿]
    anchors:
      chapter: 第三章
      questions: [14]
    prompts:
      - "如果TA长大后选了一种你不认同的生活，你能真正放手吗？（第三章#14）"
      - "你希望TA从你身上继承什么、逃离什么？"
      - "你今天对TA的要求，是在塑造TA，还是在修补自己？"

  - name: 钱
    keywords: [钱不够, 工资, 加薪, 降薪, 财务压力, 赚钱, 穷]
    anchors:
      chapter: 第五章
      questions: [21, 22, 25]
    prompts:
      - "你写过的\"够了\"的数字，是多少？现在还认这个数吗？（第五章#21）"
      - "如果财富目标永远不达成，你的生活会崩溃吗？（第五章#22）"
      - "你在追的是钱，还是钱能买到的某种感觉？那种感觉一定得用钱换吗？"

  - name: 委屈
    keywords: [委屈, 不甘, 不公, 不被看见, 被误解, 没人懂]
    anchors:
      chapter: 第一章
      questions: [2, 4]
    companion: "先不分析。这种委屈你熟悉吗？它像谁的影子？"
    prompts:
      - "你最不想被贴的标签是什么？今天的情境踩到这个标签了吗？（第一章#2）"
      - "你是想被看见，还是想被认可？这两件事是一件吗？"
      - "如果这事发生在你最敬重的人身上，你会怎么跟TA说？能对自己说同样的话吗？"

  - name: 迷茫
    keywords: [迷茫, 不知道, 失去方向, 没目标, 混乱, 不清楚]
    anchors:
      chapter: 第二章
      questions: [6, 9]
    prompts:
      - "你的7个核心价值排第1的是哪一个？今天在做的事服务于它吗？（第二章#6）"
      - "A 人生（高薪无创造）和 B 人生（低薪高自由）你当年选的是哪个？现在还这么选吗？（第二章#9）"
      - "迷茫是因为没答案，还是因为答案你不愿意承认？"

  - name: 失控
    keywords: [失控, 崩溃, 撑不住, 太累, burn out, 精神疲惫]
    anchors:
      chapter: 第五章
      questions: [23, 25]
    companion: "停一下。先喝口水，再回来。"
    prompts:
      - "如果医生说你还剩5年，这周你做的事有几件还值得做？（第五章#25）"
      - "一天24小时里，\"无意义消耗\"占了多少？（第五章#23）"
      - "你是真的撑不住了，还是在用\"撑\"来证明自己的价值？"

  - name: 恐惧
    keywords: [怕, 恐惧, 担心, 焦虑, 害怕, 不敢]
    anchors:
      chapter: 第六章
      questions: [26, 27]
    companion: "恐惧本身不是问题，逃避恐惧才是。它在提醒你什么？"
    prompts:
      - "你最怕的那件事，是\"失去\"还是\"暴露\"？（第六章#26）"
      - "这个恐惧塑造了你多少决策？列3个给我看。"
      - "你的3条人生红线里，这件事踩到哪一条了？（第六章#27）"

  - name: 成就
    keywords: [成就, 成功, 晋升, 提拔, 获奖, 搞定了]
    anchors:
      chapter: 第四章
      questions: [18, 20]
    prompts:
      - "这个成就是你一个人走在路上想起来会微笑的那种吗？（第四章#18）"
      - "它对齐了你60岁那张\"终点画面\"吗？（第四章#20）"
      - "庆祝完之后，你明天最想做的事还是今天在做的事吗？"

  - name: 加班
    keywords: [加班, 熬夜, 出差, 工作太多, 忙]
    anchors:
      chapter: 第五章
      questions: [23, 24]
    prompts:
      - "这一小时是在为自己买时间，还是在替别人花时间？"
      - "什么东西你绝对不愿意让别人替你做？今天的加班里有这类东西吗？（第五章#24）"

  - name: 默认
    keywords: []
    anchors:
      chapter: 全书
      questions: []
    prompts:
      - "这件事触及了你宪法里的哪一条？"
      - "如果明年这个时候回看，你希望今天的自己做了什么决定？"
      - "你在说\"我想\"，还是在说\"应该\"？这两个词今天哪个更重？"
