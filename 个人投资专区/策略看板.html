<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC投资策略看板</title>
<style>
:root {
  --bg: #1a1b2e;
  --card: #242640;
  --card-hover: #2d2f4e;
  --border: #363856;
  --text: #e4e4f0;
  --text-dim: #8b8da0;
  --accent: #f7931a;
  --green: #00d4aa;
  --red: #ff6b6b;
  --blue: #4e7cff;
  --purple: #a855f7;
  --yellow: #fbbf24;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 20px;
  min-height: 100vh;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 24px;
  background: linear-gradient(135deg, #242640, #1a1b2e);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 16px;
}
.header h1 {
  font-size: 22px;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 10px;
}
.header .update-time {
  color: var(--text-dim);
  font-size: 13px;
}
.grid { display: grid; gap: 16px; }
.grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  transition: background 0.2s;
}
.card:hover { background: var(--card-hover); }
.card-title {
  font-size: 13px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.big-num {
  font-size: 32px;
  font-weight: 700;
  line-height: 1.2;
}
.sub-num {
  font-size: 14px;
  margin-top: 4px;
}
.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
}
.tag-up { background: rgba(0,212,170,0.15); color: var(--green); }
.tag-down { background: rgba(255,107,107,0.15); color: var(--red); }
.tag-neutral { background: rgba(78,124,255,0.15); color: var(--blue); }
.tag-warn { background: rgba(251,191,36,0.15); color: var(--yellow); }

/* Pools */
.pools-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-top: 16px; }
.pool-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.pool-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.pool-a::before { background: var(--green); }
.pool-b::before { background: var(--blue); }
.pool-c::before { background: var(--purple); }
.pool-label {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
}
.pool-btc {
  font-size: 24px;
  font-weight: 700;
  color: var(--accent);
}
.pool-detail {
  margin-top: 12px;
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.8;
}
.pool-detail strong { color: var(--text); }

/* Pie chart SVG */
.pie-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
.pie-legend {
  font-size: 13px;
  line-height: 2;
}
.pie-legend span {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 2px;
  margin-right: 6px;
  vertical-align: middle;
}

/* Recommendations */
.rec-list {
  list-style: none;
  margin-top: 8px;
}
.rec-list li {
  padding: 10px 14px;
  border-left: 3px solid var(--accent);
  margin-bottom: 8px;
  background: rgba(247,147,26,0.05);
  border-radius: 0 8px 8px 0;
  font-size: 14px;
  line-height: 1.6;
}

/* Progress bar */
.progress-container {
  margin-top: 12px;
}
.progress-bar-bg {
  height: 20px;
  background: var(--border);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 10px;
  background: linear-gradient(90deg, var(--green), var(--blue));
  transition: width 0.5s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  min-width: 30px;
}
.cashflow-stats {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 13px;
  color: var(--text-dim);
}

/* Risk signals */
.risk-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 8px; }
.risk-item {
  padding: 12px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.5;
}
.risk-ok { background: rgba(0,212,170,0.08); border: 1px solid rgba(0,212,170,0.2); }
.risk-warn { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.2); }
.risk-danger { background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.2); }

/* History */
.history-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 8px;
  font-size: 13px;
}
.history-table th {
  text-align: left;
  padding: 8px 12px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  font-weight: 500;
}
.history-table td {
  padding: 8px 12px;
  border-bottom: 1px solid rgba(54,56,86,0.5);
}

.section-gap { margin-top: 16px; }

@media (max-width: 768px) {
  .grid-3, .pools-grid, .risk-grid { grid-template-columns: 1fr; }
  .grid-2 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<script>
// ====== DATA BLOCK START ======
const DATA = {
  "update_time": "2026-04-11 11:27",
  "btc_price_usd": 73037,
  "btc_24h_change": 1.7,
  "btc_7d_change": 0,
  "fear_greed_index": 15,
  "fear_greed_label": "极度恐惧",
  "usdt_cny_rate": 6.83,
  "total_btc": 2.83,
  "accumulated_btc": 0.0,
  "strike_step": 1000,
  "pools": {
    "A": {
      "name": "A池-现金流",
      "btc": 0.99,
      "pct": 35,
      "strategy": "Sell High",
      "strike": 82000,
      "strike_alt": 83000,
      "premium_pct": 12.3,
      "tenor": "14天",
      "apy": 17.2,
      "buy_low_target": 64000,
      "buy_low_disc_pct": 12.4,
      "status": "运行中"
    },
    "B": {
      "name": "B池-增币",
      "btc": 1.42,
      "pct": 50,
      "strategy": "Sell High远期+网格",
      "strike": 86000,
      "strike_alt": 85000,
      "premium_pct": 17.7,
      "tenor": "30天",
      "apy": 10.8,
      "grid_low": 62000,
      "grid_high": 84000,
      "status": "运行中"
    },
    "C": {
      "name": "C池-储备",
      "btc": 0.42,
      "pct": 15,
      "strategy": "冷存储",
      "status": "安全锁定"
    }
  },
  "cashflow": {
    "annual_target_cny": 300000,
    "ytd_withdrawn_cny": 0,
    "monthly_target_usdt": 3660,
    "monthly_target_cny": 25000,
    "months_elapsed": 3
  },
  "recommendations": [
    "A池 Sell High：行权价 $82,000(+12.3%) 或 $83,000, 周期14天, APY 17.2%",
    "B池 Sell High：行权价 $86,000(+17.7%) 或 $85,000, 周期30天, APY 10.8%",
    "Buy Low参考：$64,000(-12.4%)；网格区间 $62,000-$84,000",
    "⚠️ 月度提现滞后3个月！建议本周P2P出金$3,660 USDT(≈¥25,000)"
  ],
  "risk_signals": [
    {
      "name": "BTC价格",
      "condition": "< $40,000",
      "current": "正常",
      "level": "ok",
      "action": "当前$73,037，距首档触发线33%"
    },
    {
      "name": "波动率IV",
      "condition": "> 60%",
      "current": "正常",
      "level": "ok",
      "action": "权利金收入正常水平"
    }
  ],
  "weekly_history": [
    {
      "week": "W14",
      "date": "2026-04-05",
      "btc_price": 67244,
      "total_btc": 4.2,
      "ytd_withdrawn": 0,
      "action": "初始配置，三池分仓"
    },
    {
      "week": "W15",
      "date": "2026-04-06",
      "btc_price": 67244,
      "total_btc": 4.2,
      "ytd_withdrawn": 0,
      "action": "周度自动更新"
    }
  ]
};
// ====== DATA BLOCK END ======

function formatUSD(n) { return '$' + n.toLocaleString('en-US'); }
function formatCNY(n) { return '¥' + n.toLocaleString('zh-CN'); }
function formatPct(n) { return (n >= 0 ? '+' : '') + n.toFixed(1) + '%'; }

function render() {
  const d = DATA;
  const totalValueUSD = d.total_btc * d.btc_price_usd;
  const totalValueCNY = totalValueUSD * d.usdt_cny_rate;
  const changeClass = d.btc_24h_change >= 0 ? 'tag-up' : 'tag-down';
  const fgClass = d.fear_greed_index < 30 ? 'tag-down' : d.fear_greed_index < 50 ? 'tag-warn' : 'tag-up';
  const cashPct = Math.min(100, (d.cashflow.ytd_withdrawn_cny / d.cashflow.annual_target_cny * 100));
  const expectedPct = (d.cashflow.months_elapsed / 12 * 100);

  document.body.innerHTML = `
  <div class="header">
    <h1>&#x20BF; BTC投资策略看板</h1>
    <div class="update-time">数据更新: ${d.update_time}</div>
  </div>

  <!-- Row 1: Market + Holdings + Pie -->
  <div class="grid grid-3">
    <div class="card">
      <div class="card-title">&#x1F4C8; 市场数据</div>
      <div class="big-num" style="color:var(--accent)">${formatUSD(d.btc_price_usd)}</div>
      <div class="sub-num">
        24h <span class="${changeClass}">${formatPct(d.btc_24h_change)}</span>
        &nbsp; 7d <span class="${d.btc_7d_change >= 0 ? 'tag-up' : 'tag-down'}">${formatPct(d.btc_7d_change)}</span>
      </div>
      <div class="sub-num" style="margin-top:12px">
        恐贪指数 <span class="tag ${fgClass}">${d.fear_greed_index} ${d.fear_greed_label}</span>
      </div>
      <div class="sub-num">USDT/CNY <strong>${d.usdt_cny_rate.toFixed(2)}</strong></div>
    </div>
    <div class="card">
      <div class="card-title">&#x1F4B0; 持仓概览</div>
      <div class="big-num">${d.total_btc.toFixed(2)} <span style="font-size:16px;color:var(--accent)">BTC</span></div>
      <div class="sub-num">总市值 <strong>${formatUSD(Math.round(totalValueUSD))}</strong></div>
      <div class="sub-num">折合人民币 <strong>${formatCNY(Math.round(totalValueCNY))}</strong></div>
      <div class="sub-num" style="margin-top:12px">
        累计增币 <span class="tag ${d.accumulated_btc > 0 ? 'tag-up' : 'tag-neutral'}">${d.accumulated_btc >= 0 ? '+' : ''}${d.accumulated_btc.toFixed(4)} BTC</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">&#x1F4CA; 三池资产分布</div>
      <div class="pie-container">
        <svg width="120" height="120" viewBox="0 0 42 42">
          <circle cx="21" cy="21" r="15.9" fill="none" stroke="var(--border)" stroke-width="5"/>
          <!-- A池 35% -->
          <circle cx="21" cy="21" r="15.9" fill="none" stroke="var(--green)" stroke-width="5"
            stroke-dasharray="${35} ${65}" stroke-dashoffset="25" />
          <!-- B池 50% -->
          <circle cx="21" cy="21" r="15.9" fill="none" stroke="var(--blue)" stroke-width="5"
            stroke-dasharray="${50} ${50}" stroke-dashoffset="${25 - 35}" />
          <!-- C池 15% -->
          <circle cx="21" cy="21" r="15.9" fill="none" stroke="var(--purple)" stroke-width="5"
            stroke-dasharray="${15} ${85}" stroke-dashoffset="${25 - 35 - 50}" />
          <text x="21" y="22" text-anchor="middle" fill="var(--text)" font-size="5" font-weight="700">${d.total_btc}</text>
          <text x="21" y="26" text-anchor="middle" fill="var(--text-dim)" font-size="3">BTC</text>
        </svg>
        <div class="pie-legend">
          <div><span style="background:var(--green)"></span>A池 现金流 ${d.pools.A.btc} (${d.pools.A.pct}%)</div>
          <div><span style="background:var(--blue)"></span>B池 增币 ${d.pools.B.btc} (${d.pools.B.pct}%)</div>
          <div><span style="background:var(--purple)"></span>C池 储备 ${d.pools.C.btc} (${d.pools.C.pct}%)</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Row 2: Pool Details -->
  <div class="pools-grid section-gap">
    <div class="pool-card pool-a">
      <div class="pool-label" style="color:var(--green)">A池 - 现金流</div>
      <div class="pool-btc">${d.pools.A.btc} BTC</div>
      <div class="pool-detail">
        <strong>策略:</strong> ${d.pools.A.strategy}<br>
        <strong>行权价:</strong> <span style="color:var(--green);font-size:15px;font-weight:700">${formatUSD(d.pools.A.strike)}</span> (+${d.pools.A.premium_pct || ''}%)<br>
        <strong>备选档:</strong> ${formatUSD(d.pools.A.strike_alt || d.pools.A.strike + 1000)} (更保守)<br>
        <strong>周期:</strong> ${d.pools.A.tenor}<br>
        <strong>预估APY:</strong> <span style="color:var(--green)">${d.pools.A.apy}%</span><br>
        <strong>Buy Low:</strong> ${formatUSD(d.pools.A.buy_low_target)} (-${d.pools.A.buy_low_disc_pct || ''}%)<br>
        <strong>状态:</strong> <span class="tag tag-up">${d.pools.A.status}</span>
      </div>
    </div>
    <div class="pool-card pool-b">
      <div class="pool-label" style="color:var(--blue)">B池 - 增币</div>
      <div class="pool-btc">${d.pools.B.btc} BTC</div>
      <div class="pool-detail">
        <strong>策略:</strong> ${d.pools.B.strategy}<br>
        <strong>行权价:</strong> <span style="color:var(--blue);font-size:15px;font-weight:700">${formatUSD(d.pools.B.strike)}</span> (+${d.pools.B.premium_pct || ''}%)<br>
        <strong>备选档:</strong> ${formatUSD(d.pools.B.strike_alt || d.pools.B.strike - 1000)} (更激进)<br>
        <strong>周期:</strong> ${d.pools.B.tenor}<br>
        <strong>预估APY:</strong> <span style="color:var(--blue)">${d.pools.B.apy}%</span><br>
        <strong>网格区间:</strong> ${formatUSD(d.pools.B.grid_low)} - ${formatUSD(d.pools.B.grid_high)}<br>
        <strong>状态:</strong> <span class="tag tag-up">${d.pools.B.status}</span>
      </div>
    </div>
    <div class="pool-card pool-c">
      <div class="pool-label" style="color:var(--purple)">C池 - 储备</div>
      <div class="pool-btc">${d.pools.C.btc} BTC</div>
      <div class="pool-detail">
        <strong>策略:</strong> ${d.pools.C.strategy}<br>
        <strong>状态:</strong> <span class="tag tag-neutral">${d.pools.C.status}</span><br><br>
        <span style="color:var(--text-dim);font-size:12px">
        触发条件:<br>
        - BTC跌破$40,000 → 启动抄底<br>
        - A池现金流严重不足 → 临时补充
        </span>
      </div>
    </div>
  </div>

  <!-- Row 3: Recommendations + Cashflow -->
  <div class="grid grid-2 section-gap">
    <div class="card">
      <div class="card-title">&#x1F3AF; 本周操作建议</div>
      <ul class="rec-list">
        ${d.recommendations.map(r => '<li>' + r + '</li>').join('')}
      </ul>
    </div>
    <div class="card">
      <div class="card-title">&#x1F4B5; 年度现金流追踪</div>
      <div style="font-size:15px;margin-bottom:8px">
        年度目标 <strong>${formatCNY(d.cashflow.annual_target_cny)}</strong>
      </div>
      <div class="progress-container">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" style="width:${Math.max(cashPct, 2)}%">${cashPct.toFixed(0)}%</div>
        </div>
      </div>
      <div class="cashflow-stats">
        <span>已提现 ${formatCNY(d.cashflow.ytd_withdrawn_cny)}</span>
        <span>期望进度 ${expectedPct.toFixed(0)}%</span>
        <span>剩余 ${formatCNY(d.cashflow.annual_target_cny - d.cashflow.ytd_withdrawn_cny)}</span>
      </div>
      <div style="margin-top:16px;font-size:13px;color:var(--text-dim)">
        月度目标: ${formatUSD(d.cashflow.monthly_target_usdt)} USDT ≈ ${formatCNY(d.cashflow.monthly_target_cny)}
      </div>
    </div>
  </div>

  <!-- Row 4: Risk Signals -->
  <div class="card section-gap">
    <div class="card-title">&#x26A0;&#xFE0F; 风险信号监控</div>
    <div class="risk-grid">
      ${d.risk_signals.map(r => `
        <div class="risk-item risk-${r.level}">
          <div style="font-weight:600;margin-bottom:4px">${r.name} ${r.condition}</div>
          <div>当前: <span class="tag tag-${r.level === 'ok' ? 'up' : r.level === 'warn' ? 'warn' : 'down'}">${r.current}</span></div>
          <div style="margin-top:4px;font-size:12px;color:var(--text-dim)">${r.action}</div>
        </div>
      `).join('')}
    </div>
  </div>

  <!-- Row 5: History -->
  <div class="card section-gap">
    <div class="card-title">&#x1F4C5; 周度记录</div>
    <table class="history-table">
      <thead>
        <tr><th>周次</th><th>日期</th><th>BTC价格</th><th>总BTC</th><th>年度已提现</th><th>操作摘要</th></tr>
      </thead>
      <tbody>
        ${d.weekly_history.slice().reverse().map(h => `
          <tr>
            <td>${h.week}</td>
            <td>${h.date}</td>
            <td>${formatUSD(h.btc_price)}</td>
            <td>${h.total_btc.toFixed(2)}</td>
            <td>${formatCNY(h.ytd_withdrawn)}</td>
            <td>${h.action}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  </div>

  <div style="text-align:center;margin-top:20px;color:var(--text-dim);font-size:12px">
    BTC Investment Dashboard | 数据来源: CoinGecko + Alternative.me | 策略仅供参考，不构成投资建议
  </div>
  `;
}

render();
</script>
</body>
</html>
